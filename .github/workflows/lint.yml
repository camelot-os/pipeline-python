name: python lint

on:
    workflow_call:
      inputs:
        python-version:
          required: true
          type: string

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
    - run: |
        pip install tox
    - name: Lint
      run: |
        tox -e lint
